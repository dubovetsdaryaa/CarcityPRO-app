<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  >
  <meta name="color-scheme" content="light">
  <title>CarcityPRO</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --green: #007C5A;
      --text: #101318;
      --muted: #6B7280;
      --page: #FFFFFF;
      --soft: #F5F7FA;
      --line: #E7EBF1;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--page);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 20px;
    }

    .loader {
      width: 100%;
      max-width: 340px;
      display: grid;
      justify-items: center;
      gap: 16px;
      text-align: center;
    }

    .logo {
      width: 62px;
      height: 62px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      background: #E8F6F1;
      color: var(--green);
      font-size: 30px;
      box-shadow: 0 12px 28px rgba(0, 124, 90, .12);
    }

    .spinner {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      border: 4px solid #DDE7E4;
      border-top-color: var(--green);
      animation: spin .85s linear infinite;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      font-weight: 820;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
    }

    .status {
      min-height: 20px;
      font-size: 13px;
      color: var(--muted);
    }

    .button {
      width: 100%;
      min-height: 48px;
      border: 1.5px solid var(--green);
      border-radius: 14px;
      background: #FFFFFF;
      color: var(--green);
      font-size: 15px;
      font-weight: 760;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 12px 14px;
      cursor: pointer;
    }

    .button.visible {
      display: flex;
    }

    .hint {
      margin-top: 4px;
      padding: 12px;
      border-radius: 14px;
      background: var(--soft);
      border: 1px solid var(--line);
      font-size: 12px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <main class="loader">
    <div class="logo">🚗</div>
    <div class="spinner" aria-label="Загрузка"></div>
    <h1>Запускаем CarcityPRO</h1>
    <p>
      Сервер просыпается после паузы. Обычно это занимает 10–30 секунд.
    </p>
    <div class="status" id="statusText">Проверяем готовность приложения…</div>
    <button class="button" id="openButton" type="button">
      Открыть CarcityPRO
    </button>
    <p class="hint">
      Это нормальная загрузка бесплатного сервера. Сейчас откроем приложение автоматически.
    </p>
  </main>

  <script>
    const TARGET_URL = "https://carcitypro-backend.onrender.com/app/?v=voice-clarify-strict-v3";
    const HEALTH_URL = "https://carcitypro-backend.onrender.com/health";
    const statusText = document.getElementById("statusText");
    const openButton = document.getElementById("openButton");

    try {
      window.Telegram?.WebApp?.ready();
      window.Telegram?.WebApp?.expand();
    } catch (_) {}

    function openApp() {
      const initData = window.Telegram?.WebApp?.initData || "";
      const hash = initData
        ? `#tginit=${encodeURIComponent(initData)}`
        : "";

      window.location.replace(`${TARGET_URL}${hash}`);
    }

    openButton.addEventListener("click", openApp);

    async function waitForBackend() {
      const startedAt = Date.now();
      let attempt = 0;

      while (Date.now() - startedAt < 65000) {
        attempt += 1;

        try {
          const response = await fetch(`${HEALTH_URL}?wake=${Date.now()}`, {
            method: "GET",
            cache: "no-store"
          });

          if (response.ok) {
            statusText.textContent = "Готово. Открываем приложение…";
            setTimeout(openApp, 450);
            return;
          }
        } catch (_) {}

        const seconds = Math.floor((Date.now() - startedAt) / 1000);
        statusText.textContent = `Запускаем сервер… ${seconds} сек.`;

        await new Promise(resolve => setTimeout(resolve, attempt < 4 ? 2200 : 3200));
      }

      statusText.textContent = "Сервер запускается дольше обычного. Нажмите кнопку ниже.";
      openButton.classList.add("visible");
    }

    waitForBackend();
  </script>
</body>
</html>
